<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Karam Store - Your Trusted Computer Partner">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Karam Store">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.ico"/>

  <title>Karam Store</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google APIs for OAuth -->
  <script src="https://apis.google.com/js/api.js" defer></script>
  <script src="https://accounts.google.com/gsi/client" defer></script>

  <!-- Splash Screen Styles -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0e0e0e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: opacity 1.2s ease-out, transform 1.2s ease-out;
    }

    #splash.hide {
      opacity: 0;
      transform: scale(1.1);
      pointer-events: none;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: float 3s ease-in-out infinite;
    }

    .logo-icon {
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 30% 30%, #10d5ff, #0088aa);
      border-radius: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 56px;
      font-weight: 900;
      color: white;
      box-shadow: 0 0 60px rgba(16, 213, 255, 0.3);
      margin-bottom: 24px;
    }

    .logo-icon span {
      letter-spacing: -2px;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .brand-name span {
      color: #10d5ff;
    }

    .subtitle {
      font-size: 14px;
      color: #859398;
      margin-top: 8px;
      letter-spacing: 2px;
      font-weight: 300;
    }

    .loading-bar-container {
      margin-top: 48px;
      width: 200px;
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #10d5ff, #00e3fd);
      border-radius: 2px;
      animation: load 2.4s ease-in-out infinite;
    }

    @keyframes load {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .dots {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10d5ff;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="logo-container">
      <div class="logo-icon">
        <span>K</span>
      </div>
      <div class="brand-name">Karam <span>Store</span></div>
      <div class="subtitle">Your Trusted Computer Partner</div>
    </div>

    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
